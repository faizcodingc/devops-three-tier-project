name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

              - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t faizcodingcd/devops-backend:v1 ./backend

      - name: Build Frontend Image
        run: docker build -t faizcodingcd/devops-frontend:v1 ./frontend

      - name: Push Backend Image
        run: docker push faizcodingcd/devops-backend:v1

      - name: Push Frontend Image
        run: docker push faizcodingcd/devops-frontend:v1
